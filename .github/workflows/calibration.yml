name: Daily Smart Calibration

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  calibrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set timezone
        run: sudo timedatectl set-timezone Europe/Kiev

      - name: Run Calibration Script
        id: run_script
        run: python scripts/scheduler.py

      - name: Commit changes
        run: |
          git config --global user.name "Calibration Bot"
          git config --global user.email "bot@github.com"
          
          # Додаємо всі зміни у відстеження
          git add .

          # Перевіряємо, чи є підготовлені зміни
          if git diff --staged --quiet; then
            echo "Змін для коміту не виявлено."
          else
            echo "Виявлено зміни. Роблю коміт..."
            git commit -m "chore: Оновлення даних калібрування" -m "Автоматичне калібрування графіка або оновлення дати перевірки."
            git push
          fi
