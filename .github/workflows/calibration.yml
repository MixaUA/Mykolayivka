name: Daily Smart Calibration

on:
  schedule:
    # 22:00 UTC — це 00:00 за Києвом. Бот працюватиме з 00:00 до 00:45 кожні 15 хв.
    - cron: '*/15 22 * * *'
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Встановлюємо часовий пояс Києва, щоб скрипт правильно визначав "сьогодні"
      - name: Set Timezone
        run: sudo timedatectl set-timezone Europe/Kiev

      - name: Run Calibration Script
        id: run_script
        # Переконайся, що шлях до файлу правильний!
        run: python scripts/scheduler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Calibration Bot"
          git config --global user.email "bot@github.com"
          
          git add mapping.json
          
          if git diff --staged --quiet; then
            echo "Змін у mapping.json не виявлено."
          else
            echo "Виявлено зміни. Пушу в репозиторій..."
            git commit -m "chore: Оновлення калібрування (авто)"
            git push
          fi