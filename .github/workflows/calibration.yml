name: Daily Smart Calibration

on:
  schedule:
    # Runs every 15 minutes from 00:00 to 00:59 UTC.
    # This ensures it runs once per day, even with slight runner delays.
    - cron: '*/15 0 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  calibrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up logging
        run: |
          mkdir -p logs
          LNAME="logs/calibration_$(date +'%Y%m%d%H%M').log"
          echo "LOG_FILE=$LNAME" >> $GITHUB_ENV
          echo "=== Calibration run started at $(date -u) ===" > "$LNAME"

      - name: Check if already calibrated today
        id: check_calibration
        run: |
          echo "--- Checking calibration status ---" >> ${{ env.LOG_FILE }}
          if [ -f mapping.json ]; then
            LAST_CAL=$(jq -r '.lastCalibration' mapping.json 2>/dev/null || echo "none")
            TODAY=$(date -u +%Y-%m-%d)
            if [ "$LAST_CAL" == "$TODAY" ]; then
              echo "✅ Already calibrated today (Date: $TODAY). Skipping." >> ${{ env.LOG_FILE }}
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "ℹ️ Not calibrated today. Proceeding with calibration." >> ${{ env.LOG_FILE }}
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Process and Generate Mapping
        if: steps.check_calibration.outputs.skip == 'false'
        id: process_map
        run: |
          echo "--- Processing and Generating Mapping ---" >> ${{ env.LOG_FILE }}
          UPDATE_STR=$(jq -r '.update_time' database_new.json)
          if [ -z "$UPDATE_STR" ]; then
            echo "❌ ERROR: Update time not found in database_new.json!" >> ${{ env.LOG_FILE }}
            exit 1
          fi
          echo "Found update_time: $UPDATE_STR" >> ${{ env.LOG_FILE }}

          CLEAN_DATE=$(echo "$UPDATE_STR" | awk '{print $1}' | sed 's/\./-/g' | awk -F- '{print $3"-"$2"-"$1}')
          TODAY=$(date -u +%Y-%m-%d)
          echo "Cleaned DB date: $CLEAN_DATE, Today's date: $TODAY" >> ${{ env.LOG_FILE }}

          DIFF_SECONDS=$(( $(date -u -d "$TODAY" +%s) - $(date -u -d "$CLEAN_DATE" +%s) ))
          DIFF_DAYS=$(( DIFF_SECONDS / 86400 ))
          echo "Day difference: $DIFF_DAYS" >> ${{ env.LOG_FILE }}

          if [ "$DIFF_DAYS" -eq 1 ]; then
            FINAL_MAP="[6, 0, 1, 2, 3, 4, 5]"
            STATUS="✅ Yesterday's schedule detected. Calibration applied (+1 day offset)."
          else
            FINAL_MAP="[0, 1, 2, 3, 4, 5, 6]"
            STATUS="ℹ️ Schedule is up-to-date or too old. Using standard mapping."
          fi
          echo "$STATUS" >> ${{ env.LOG_FILE }}
          
          echo "{\"calibratedMap\": $FINAL_MAP, \"lastCalibration\": \"$TODAY\"}" > mapping.json
          echo "status_message=$STATUS" >> $GITHUB_OUTPUT
          echo "Generated mapping.json:" >> ${{ env.LOG_FILE }}
          cat mapping.json >> ${{ env.LOG_FILE }}

      - name: Commit Mapping File
        if: steps.check_calibration.outputs.skip == 'false'
        run: |
          echo "--- Committing changes ---" >> ${{ env.LOG_FILE }}
          git config --global user.name "Calibration Bot"
          git config --global user.email "actions-bot@github.com"
          git add mapping.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit." >> ${{ env.LOG_FILE }}
          else
            git commit -m "chore: Daily schedule calibration" -m "${{ steps.process_map.outputs.status_message }}"
            git push
            echo "Changes committed and pushed successfully." >> ${{ env.LOG_FILE }}
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-log-${{ github.run_id }}
          path: ${{ env.LOG_FILE }}
          retention-days: 7
