name: Daily Smart Calibration

on:
  schedule:
    # Runs every 15 minutes from 00:00 to 00:59 UTC to ensure it runs once daily.
    # The script has internal guards to prevent multiple calibrations per day.
    - cron: '*/15 0 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  calibrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Calibration Script
        id: run_script
        run: python scripts/scheduler.py

      - name: Commit changes
        run: |
          git config --global user.name "Calibration Bot"
          git config --global user.email "bot@github.com"
          
          # Check if the mapping file has been modified by the script
          if ! git diff --staged --quiet mapping.json && ! git diff --quiet mapping.json; then
            echo "mapping.json changed. Committing..."
            git add mapping.json
            git commit -m "feat: Auto-calibrate schedule map" -m "Automated daily calibration based on database update time."
            git push
          else
            echo "No changes to mapping.json detected."
          fi
